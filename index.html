<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

<title>ZapFechou PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* RESET */
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  overflow-x: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #020403;
  color: #f8fafc;
}

/* ===== SPLASH CINEMATIC ===== */

#splash {
  position: fixed;
  inset: 0;
  background: #020403;
  z-index: 9999;
  overflow: hidden;
  animation: splashOut 1s ease forwards;
  animation-delay: 2.2s;
}

.cinema-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at center, rgba(0,255,100,.25), transparent 40%);
  animation: bgPulse 3s ease infinite;
}

.splash-content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.splash-logo {
  width: 110px;
  height: 110px;
  border-radius: 28px;
  border: 1px solid rgba(0,255,100,.5);
  display: grid;
  place-items: center;
  color: #00ff66;
  font-size: 48px;
  font-weight: 900;
  box-shadow: 0 0 80px rgba(0,255,100,.35);
  animation: logoCinematic 2s ease;
}

.splash-text {
  margin-top: 18px;
  font-size: 14px;
  letter-spacing: 2px;
  color: #cbd5e1;
  opacity: 0;
  animation: textFade 1.2s ease forwards;
  animation-delay: 0.6s;
}

@keyframes logoCinematic {
  0% { transform: scale(.7) translateY(30px); opacity: 0; }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes textFade {
  to { opacity: 1; }
}

@keyframes bgPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

@keyframes splashOut {
  to {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
}

/* ===== LAYOUT ===== */

.layout {
  display: grid;
  grid-template-columns: 220px 1fr;
}

.sidebar {
  display: none;
}

.app {
  padding: 18px;
  width: 100%;
}

/* ===== TOPO ===== */

h1 {
  font-size: 28px;
  margin: 0 0 20px;
}

h1 span { color: #00ff66; }

/* ===== CARDS ===== */

.stats {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}

.stat {
  padding: 14px;
  border-radius: 14px;
  background: rgba(3,8,7,.9);
  border: 1px solid rgba(0,255,100,.2);
}

.stat strong {
  font-size: 22px;
}

/* ===== FORM ===== */

.panel {
  margin-top: 15px;
  padding: 14px;
  border-radius: 14px;
  background: rgba(3,8,7,.9);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

textarea {
  grid-column: 1 / -1;
}

input, select, textarea {
  padding: 12px;
  border-radius: 10px;
  background: rgba(0,0,0,.45);
  color: white;
  border: 1px solid rgba(148,163,184,.2);
}

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.btn-add {
  background: #00ff66;
  color: black;
}

/* ===== LISTA ===== */

.lead-row {
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  background: rgba(3,8,7,.9);
}

/* ===== DESKTOP ===== */

@media (min-width: 900px) {

  .sidebar {
    display: block;
  }

  .layout {
    grid-template-columns: 220px 1fr;
  }

  .stats {
    grid-template-columns: repeat(4,1fr);
  }

  .form-grid {
    grid-template-columns: 1fr .9fr 1fr .65fr .75fr .75fr;
  }

}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="cinema-bg"></div>
  <div class="splash-content">
    <div class="splash-logo">ZF</div>
    <div class="splash-text">ZapFechou</div>
  </div>
</div>

<div class="layout">

<div class="app">

<h1>Zap<span>Fechou</span></h1>

<div class="stats">
  <div class="stat"><span>Total</span><strong id="total">0</strong></div>
  <div class="stat"><span>Negociando</span><strong id="negociando">0</strong></div>
  <div class="stat"><span>Fechados</span><strong id="fechados">0</strong></div>
  <div class="stat"><span>Parados</span><strong id="parados">0</strong></div>
</div>

<div class="panel">
<div class="form-grid">
<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="WhatsApp">
<input id="carro" placeholder="Carro">
<input id="valor" placeholder="Valor">

<select id="temperatura">
<option>Quente</option>
<option>Morno</option>
<option>Frio</option>
</select>

<select id="status">
<option>Novo</option>
<option>Em negociação</option>
<option>Fechado</option>
<option>Perdido</option>
</select>

<textarea id="observacao"></textarea>

<button class="btn-add" onclick="salvarCliente()">Salvar</button>
</div>
</div>

<div id="lista"></div>

</div>
</div>

<script>

const supabaseClient = supabase.createClient(
  "https://khuxxjtcunknikkpdgfi.supabase.co",
  "sb_publishable_E9roE3LHgPf42wAi8DXzSA_IjvXBKgl"
);

let clientes = [];

async function carregar() {
  const { data } = await supabaseClient.from("leads").select("*");
  clientes = data || [];
  renderizar();
}

async function salvarCliente() {
  const nome = document.getElementById("nome").value;
  const telefone = document.getElementById("telefone").value;
  const carro = document.getElementById("carro").value;

  if (!nome || !telefone || !carro) {
    alert("Preenche tudo");
    return;
  }

  await supabaseClient.from("leads").insert([{ nome, telefone, carro }]);
  carregar();
}

function renderizar() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  clientes.forEach(c => {
    lista.innerHTML += `
      <div class="lead-row">
        <strong>${c.nome}</strong><br>
        ${c.telefone} - ${c.carro}
      </div>
    `;
  });

  document.getElementById("total").innerText = clientes.length;
}

carregar();

</script>

</body>
</html>
