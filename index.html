<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>ZapFechou</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 211, 102, 0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.10), transparent 35%),
        #020617;
      color: #f8fafc;
      min-height: 100vh;
      padding: 28px;
    }

    .app {
      max-width: 1150px;
      margin: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .logo {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      background: linear-gradient(135deg, #25D366, #38bdf8);
      color: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 22px;
      box-shadow: 0 0 30px rgba(37, 211, 102, 0.35);
    }

    h1 {
      margin: 0;
      font-size: 34px;
    }

    .subtitle {
      color: #94a3b8;
      margin-top: 4px;
      font-size: 15px;
    }

    .badge {
      border: 1px solid #1e293b;
      background: rgba(15, 23, 42, 0.85);
      padding: 10px 14px;
      border-radius: 999px;
      color: #25D366;
      font-weight: 800;
      font-size: 13px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 22px;
    }

    .stat {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #1e293b;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.28);
    }

    .stat span {
      color: #94a3b8;
      font-size: 14px;
    }

    .stat strong {
      display: block;
      font-size: 32px;
      margin-top: 8px;
    }

    .panel {
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid #1e293b;
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 24px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1.2fr 0.9fr auto;
      gap: 12px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #263449;
      background: #020617;
      color: white;
      font-size: 15px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #25D366;
      box-shadow: 0 0 0 3px rgba(37,211,102,0.12);
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
      font-size: 15px;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .btn-add {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #020617;
      box-shadow: 0 10px 25px rgba(56,189,248,0.22);
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 24px;
    }

    .hint {
      color: #94a3b8;
      font-size: 14px;
    }

    .lead {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(15,23,42,0.96), rgba(2,6,23,0.98));
      border: 1px solid #1e293b;
      padding: 22px;
      margin-top: 14px;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.30);
      transition: 0.2s;
    }

    .lead::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(37,211,102,0.10), transparent 28%),
        linear-gradient(90deg, rgba(37,211,102,0.25), transparent 4%);
      pointer-events: none;
    }

    .lead:hover {
      transform: translateY(-3px);
      border-color: #334155;
    }

    .lead-content {
      position: relative;
      z-index: 1;
    }

    .lead-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .lead h3 {
      margin: 0;
      font-size: 23px;
    }

    .status {
      height: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(56,189,248,0.12);
      border: 1px solid rgba(56,189,248,0.25);
      color: #38bdf8;
      font-size: 13px;
      font-weight: 900;
    }

    .lead-info {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .info {
      background: rgba(2,6,23,0.72);
      border: 1px solid #1e293b;
      padding: 12px;
      border-radius: 15px;
    }

    .info span {
      color: #94a3b8;
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .info strong {
      color: #e5e7eb;
      font-size: 15px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-wpp {
      background:
        linear-gradient(135deg, #25D366, #16a34a);
      color: white;
      box-shadow: 0 10px 28px rgba(37,211,102,0.28);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-wpp .icon {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-delete {
      background: rgba(239,68,68,0.13);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.25);
    }

    .empty {
      color: #94a3b8;
      border: 1px dashed #334155;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
    }

    @media (max-width: 900px) {
      body { padding: 18px; }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }

      .dashboard,
      .form-grid,
      .lead-info {
        grid-template-columns: 1fr;
      }

      h1 { font-size: 28px; }
    }
  </style>
</head>

<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <div class="logo">ZF</div>
      <div>
        <h1>ZapFechou</h1>
        <div class="subtitle">CRM simples para vendedores de veículos no WhatsApp</div>
      </div>
    </div>
    <div class="badge">ONLINE • SUPABASE</div>
  </div>

  <div class="dashboard">
    <div class="stat">
      <span>Total de clientes</span>
      <strong id="total">0</strong>
    </div>
    <div class="stat">
      <span>Em negociação</span>
      <strong id="negociando">0</strong>
    </div>
    <div class="stat">
      <span>Fechados</span>
      <strong id="fechados">0</strong>
    </div>
  </div>

  <div class="panel">
    <h2>Adicionar novo cliente</h2>

    <div class="form-grid">
      <input id="nome" placeholder="Nome do cliente">
      <input id="telefone" placeholder="WhatsApp">
      <input id="carro" placeholder="Veículo de interesse">

      <select id="status">
        <option>Novo</option>
        <option>Interessado</option>
        <option>Negociando</option>
        <option>Fechado</option>
        <option>Perdido</option>
      </select>

      <button class="btn-add" onclick="adicionar()">Adicionar</button>
    </div>
  </div>

  <div class="section-title">
    <h2>Clientes cadastrados</h2>
    <div class="hint">Botão verde abre WhatsApp com mensagem pronta</div>
  </div>

  <div id="lista"></div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://khuxxjtcunknikkpdgfi.supabase.co",
  "sb_publishable_E9roE3LHgPf42wAi8DXzSA_IjvXBKgl"
);

function limparTelefone(numero) {
  return numero.replace(/\D/g, "");
}

function gerarMensagem(item) {
  return `Oi ${item.nome}, tudo bem? Vi que você demonstrou interesse no ${item.carro}. Ainda está procurando esse veículo ou quer que eu te mande as condições atualizadas?`;
}

function abrirWhatsApp(telefone, mensagem) {
  let numero = limparTelefone(telefone);

  if (!numero.startsWith("55")) {
    numero = "55" + numero;
  }

  const texto = encodeURIComponent(mensagem);
  window.open(`https://wa.me/${numero}?text=${texto}`, "_blank");
}

async function adicionar() {
  const nome = document.getElementById("nome").value.trim();
  const telefone = document.getElementById("telefone").value.trim();
  const carro = document.getElementById("carro").value.trim();
  const status = document.getElementById("status").value;

  if (!nome || !telefone || !carro) {
    alert("Preencha nome, WhatsApp e veículo.");
    return;
  }

  const { error } = await supabaseClient
    .from("leads")
    .insert([{ nome, telefone, carro, status }]);

  if (error) {
    alert("Erro ao salvar: " + error.message);
    console.log(error);
    return;
  }

  document.getElementById("nome").value = "";
  document.getElementById("telefone").value = "";
  document.getElementById("carro").value = "";
  document.getElementById("status").value = "Novo";

  carregar();
}

async function excluir(id) {
  const confirmar = confirm("Excluir este cliente?");
  if (!confirmar) return;

  const { error } = await supabaseClient
    .from("leads")
    .delete()
    .eq("id", id);

  if (error) {
    alert("Erro ao excluir: " + error.message);
    console.log(error);
    return;
  }

  carregar();
}

async function carregar() {
  const { data, error } = await supabaseClient
    .from("leads")
    .select("*");

  if (error) {
    alert("Erro ao carregar: " + error.message);
    console.log(error);
    return;
  }

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  document.getElementById("total").innerText = data.length;
  document.getElementById("negociando").innerText =
    data.filter(item => item.status === "Negociando").length;
  document.getElementById("fechados").innerText =
    data.filter(item => item.status === "Fechado").length;

  if (data.length === 0) {
    lista.innerHTML = `<div class="empty">Nenhum cliente cadastrado ainda.</div>`;
    return;
  }

  data.forEach(item => {
    lista.innerHTML += `
      <div class="lead">
        <div class="lead-content">
          <div class="lead-header">
            <h3>${item.nome}</h3>
            <div class="status">${item.status || "Novo"}</div>
          </div>

          <div class="lead-info">
            <div class="info">
              <span>WhatsApp</span>
              <strong>${item.telefone}</strong>
            </div>

            <div class="info">
              <span>Veículo de interesse</span>
              <strong>${item.carro}</strong>
            </div>

            <div class="info">
              <span>Status</span>
              <strong>${item.status || "Novo"}</strong>
            </div>
          </div>

          <div class="actions">
            <button class="btn-wpp" onclick='abrirWhatsApp("${item.telefone}", "${gerarMensagem(item)}")'>
              <span class="icon">💬</span>
              Chamar no WhatsApp
            </button>

            <button class="btn-delete" onclick='excluir("${item.id}")'>
              Excluir cliente
            </button>
          </div>
        </div>
      </div>
    `;
  });
}

carregar();
</script>

</body>
</html>
