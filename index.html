<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>ZapFechou PRO</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,255,120,.15), transparent 28%),
        radial-gradient(circle at bottom right, rgba(0,255,120,.08), transparent 35%),
        #020617;
      color: #f8fafc;
      min-height: 100vh;
      padding: 26px;
    }

    .app { max-width: 1250px; margin: auto; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 26px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      background: linear-gradient(135deg, #00ff75, #00ffb3);
      color: #020617;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 24px;
      box-shadow: 0 0 35px rgba(0,255,120,.6);
    }

    h1 { margin: 0; font-size: 38px; }
    h1 span { color: #00ff75; }

    .subtitle { color: #a7b4c8; margin-top: 4px; }

    .badge {
      color: #00ff75;
      border: 1px solid rgba(0,255,120,.25);
      background: rgba(0,255,120,.08);
      padding: 11px 18px;
      border-radius: 999px;
      font-weight: 900;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 22px;
    }

    .stat, .panel, .filters, .lead {
      background: rgba(15,23,42,.88);
      border: 1px solid rgba(0,255,120,.14);
      box-shadow: 0 20px 45px rgba(0,0,0,.35);
      border-radius: 22px;
    }

    .stat {
      padding: 20px;
      min-height: 120px;
    }

    .stat span { color: #a7b4c8; }
    .stat strong {
      display: block;
      margin-top: 10px;
      font-size: 34px;
    }

    .stat small { color: #00ff75; }

    .panel {
      padding: 22px;
      margin-bottom: 18px;
      box-shadow: 0 0 35px rgba(0,255,120,.06);
    }

    .panel h2, .section-title h2 {
      margin: 0 0 16px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr 1.1fr .7fr .8fr .9fr;
      gap: 12px;
    }

    textarea {
      grid-column: 1 / -1;
      resize: vertical;
      min-height: 70px;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #263449;
      background: #020617;
      color: white;
      font-size: 15px;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #00ff75;
      box-shadow: 0 0 0 3px rgba(0,255,120,.12);
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-weight: 900;
      cursor: pointer;
      transition: .2s;
      font-size: 15px;
    }

    button:hover { transform: translateY(-2px); }

    .btn-add {
      background: linear-gradient(135deg, #00ff75, #00b85c);
      color: #020617;
      box-shadow: 0 0 25px rgba(0,255,120,.25);
    }

    .btn-cancel {
      background: rgba(148,163,184,.13);
      color: #cbd5e1;
      border: 1px solid rgba(148,163,184,.25);
      display: none;
    }

    .filters {
      padding: 16px;
      margin-bottom: 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      background: #020617;
      color: white;
      border: 1px solid #263449;
      padding: 10px 14px;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #00ff75, #00b85c);
      color: #020617;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0 14px;
    }

    .hint { color: #94a3b8; }

    .lead {
      padding: 20px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }

    .lead::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,255,120,.20), transparent 18%),
        radial-gradient(circle at top right, rgba(0,255,120,.12), transparent 25%);
      pointer-events: none;
    }

    .lead-content {
      position: relative;
      z-index: 1;
    }

    .lead-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 12px;
    }

    .lead h3 { margin: 0; font-size: 24px; }

    .tag {
      padding: 7px 12px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 13px;
      display: inline-block;
      margin-left: 6px;
      margin-bottom: 6px;
    }

    .quente { background: rgba(239,68,68,.15); color: #ff6b6b; border: 1px solid rgba(239,68,68,.35); }
    .morno { background: rgba(245,158,11,.15); color: #fbbf24; border: 1px solid rgba(245,158,11,.35); }
    .frio { background: rgba(14,165,233,.15); color: #38bdf8; border: 1px solid rgba(14,165,233,.35); }
    .novo { background: rgba(56,189,248,.15); color: #38bdf8; border: 1px solid rgba(56,189,248,.35); }
    .negociando { background: rgba(0,255,120,.13); color: #00ff75; border: 1px solid rgba(0,255,120,.35); }
    .parado { background: rgba(245,158,11,.15); color: #f59e0b; border: 1px solid rgba(245,158,11,.35); }

    .lead-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .info {
      background: rgba(2,6,23,.75);
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 12px;
    }

    .info span {
      color: #94a3b8;
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
    }

    .info strong { font-size: 15px; }

    .obs {
      background: rgba(2,6,23,.75);
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 14px;
      color: #cbd5e1;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-wpp {
      background: linear-gradient(135deg, #25D366, #16a34a);
      color: white;
      box-shadow: 0 0 22px rgba(37,211,102,.25);
    }

    .btn-edit {
      background: rgba(0,255,120,.12);
      color: #00ff75;
      border: 1px solid rgba(0,255,120,.25);
    }

    .btn-delete {
      background: rgba(239,68,68,.13);
      color: #ff6b6b;
      border: 1px solid rgba(239,68,68,.25);
    }

    .empty {
      color: #94a3b8;
      border: 1px dashed #334155;
      padding: 25px;
      border-radius: 18px;
      text-align: center;
    }

    @media (max-width: 950px) {
      body { padding: 14px; }
      .topbar { flex-direction: column; align-items: flex-start; gap: 12px; }
      .stats, .form-grid, .lead-grid { grid-template-columns: 1fr; }
      textarea { grid-column: auto; }
      h1 { font-size: 30px; }
      .lead-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <div class="logo">ZF</div>
      <div>
        <h1>Zap<span>Fechou</span></h1>
        <div class="subtitle">CRM simples para vendedores de veículos no WhatsApp</div>
      </div>
    </div>
    <div class="badge">ONLINE • SUPABASE</div>
  </div>

  <div class="stats">
    <div class="stat"><span>Total de clientes</span><strong id="total">0</strong><small>clientes cadastrados</small></div>
    <div class="stat"><span>Em negociação</span><strong id="negociando">0</strong><small>em andamento</small></div>
    <div class="stat"><span>Fechados</span><strong id="fechados">0</strong><small>vendas ganhas</small></div>
    <div class="stat"><span>Parados</span><strong id="parados">0</strong><small>precisam atenção</small></div>
  </div>

  <div class="panel">
    <h2 id="formTitle">Adicionar novo cliente</h2>

    <div class="form-grid">
      <input id="nome" placeholder="Nome do cliente">
      <input id="telefone" placeholder="WhatsApp">
      <input id="carro" placeholder="Veículo de interesse">
      <input id="valor" type="number" placeholder="Valor R$">

      <select id="temperatura">
        <option value="">Temperatura</option>
        <option>Quente</option>
        <option>Morno</option>
        <option>Frio</option>
      </select>

      <select id="status">
        <option>Novo</option>
        <option>Em negociação</option>
        <option>Fechado</option>
        <option>Perdido</option>
      </select>

      <textarea id="observacao" placeholder="Observação: financiamento, entrada, horário para contato, preferência do cliente..."></textarea>

      <button id="btnSalvar" class="btn-add" onclick="salvarCliente()">+ Adicionar cliente</button>
      <button id="btnCancelar" class="btn-cancel" onclick="cancelarEdicao()">Cancelar edição</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filtrar('Todos', this)">Todos</button>
    <button class="filter-btn" onclick="filtrar('Novo', this)">Novos</button>
    <button class="filter-btn" onclick="filtrar('Em negociação', this)">Em negociação</button>
    <button class="filter-btn" onclick="filtrar('Fechado', this)">Fechados</button>
    <button class="filter-btn" onclick="filtrar('Perdido', this)">Perdidos</button>
    <button class="filter-btn" onclick="filtrar('Quente', this)">🔥 Quentes</button>
    <button class="filter-btn" onclick="filtrar('Morno', this)">🟡 Mornos</button>
    <button class="filter-btn" onclick="filtrar('Frio', this)">❄️ Frios</button>
    <button class="filter-btn" onclick="filtrar('Parados', this)">⏰ Parados</button>
  </div>

  <div class="section-title">
    <h2>Clientes cadastrados</h2>
    <div class="hint">Parado = mais de 3 dias sem contato</div>
  </div>

  <div id="lista"></div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://khuxxjtcunknikkpdgfi.supabase.co",
  "sb_publishable_E9roE3LHgPf42wAi8DXzSA_IjvXBKgl"
);

let clientes = [];
let filtroAtual = "Todos";
let editandoId = null;

function dinheiro(valor) {
  if (!valor) return "Não informado";
  return Number(valor).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

function diasSemContato(data) {
  if (!data) return 0;
  const hoje = new Date();
  const ultimo = new Date(data);
  return Math.floor((hoje - ultimo) / (1000 * 60 * 60 * 24));
}

function limparTelefone(numero) {
  return String(numero || "").replace(/\D/g, "");
}

function gerarMensagem(item) {
  return `Oi ${item.nome}, tudo bem? Vi que você demonstrou interesse no ${item.carro}. Ainda está procurando esse veículo? Posso te passar as condições atualizadas.`;
}

async function abrirWhatsApp(item) {
  let numero = limparTelefone(item.telefone);
  if (!numero.startsWith("55")) numero = "55" + numero;

  const { error } = await supabaseClient
    .from("leads")
    .update({ ultimo_contato: new Date().toISOString() })
    .eq("id", item.id);

  if (error) {
    alert("Erro ao atualizar contato: " + error.message);
    return;
  }

  const texto = encodeURIComponent(gerarMensagem(item));
  window.open(`https://wa.me/${numero}?text=${texto}`, "_blank");

  carregar();
}

function preencherFormulario(item) {
  editandoId = item.id;

  document.getElementById("nome").value = item.nome || "";
  document.getElementById("telefone").value = item.telefone || "";
  document.getElementById("carro").value = item.carro || "";
  document.getElementById("valor").value = item.valor || "";
  document.getElementById("temperatura").value = item.temperatura || "";
  document.getElementById("status").value = item.status || "Novo";
  document.getElementById("observacao").value = item.observacao || "";

  document.getElementById("formTitle").innerText = "Editando cliente";
  document.getElementById("btnSalvar").innerText = "Salvar alterações";
  document.getElementById("btnCancelar").style.display = "inline-block";

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function cancelarEdicao() {
  editandoId = null;
  limparFormulario();
}

function limparFormulario() {
  document.getElementById("nome").value = "";
  document.getElementById("telefone").value = "";
  document.getElementById("carro").value = "";
  document.getElementById("valor").value = "";
  document.getElementById("temperatura").value = "";
  document.getElementById("status").value = "Novo";
  document.getElementById("observacao").value = "";

  document.getElementById("formTitle").innerText = "Adicionar novo cliente";
  document.getElementById("btnSalvar").innerText = "+ Adicionar cliente";
  document.getElementById("btnCancelar").style.display = "none";
}

async function salvarCliente() {
  const nome = document.getElementById("nome").value.trim();
  const telefone = document.getElementById("telefone").value.trim();
  const carro = document.getElementById("carro").value.trim();
  const valor = document.getElementById("valor").value;
  const temperatura = document.getElementById("temperatura").value;
  const status = document.getElementById("status").value;
  const observacao = document.getElementById("observacao").value.trim();

  if (!nome || !telefone || !carro) {
    alert("Preencha nome, WhatsApp e veículo.");
    return;
  }

  const dados = {
    nome,
    telefone,
    carro,
    valor: valor || null,
    temperatura,
    status,
    observacao
  };

  let resultado;

  if (editandoId) {
    resultado = await supabaseClient
      .from("leads")
      .update(dados)
      .eq("id", editandoId);
  } else {
    resultado = await supabaseClient
      .from("leads")
      .insert([{ ...dados, ultimo_contato: new Date().toISOString() }]);
  }

  if (resultado.error) {
    alert("Erro ao salvar: " + resultado.error.message);
    console.log(resultado.error);
    return;
  }

  editandoId = null;
  limparFormulario();
  carregar();
}

async function excluir(id) {
  if (!confirm("Excluir este cliente?")) return;

  const { error } = await supabaseClient.from("leads").delete().eq("id", id);

  if (error) {
    alert("Erro ao excluir: " + error.message);
    return;
  }

  carregar();
}

function filtrar(tipo, botao) {
  filtroAtual = tipo;

  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  botao.classList.add("active");

  renderizar();
}

function aplicaFiltro(item) {
  const parado = diasSemContato(item.ultimo_contato) >= 3 && item.status !== "Fechado" && item.status !== "Perdido";

  if (filtroAtual === "Todos") return true;
  if (filtroAtual === "Parados") return parado;
  if (["Quente", "Morno", "Frio"].includes(filtroAtual)) return item.temperatura === filtroAtual;
  return item.status === filtroAtual;
}

async function carregar() {
  const { data, error } = await supabaseClient
    .from("leads")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    alert("Erro ao carregar: " + error.message);
    console.log(error);
    return;
  }

  clientes = data || [];
  atualizarDashboard();
  renderizar();
}

function atualizarDashboard() {
  document.getElementById("total").innerText = clientes.length;
  document.getElementById("negociando").innerText = clientes.filter(c => c.status === "Em negociação").length;
  document.getElementById("fechados").innerText = clientes.filter(c => c.status === "Fechado").length;
  document.getElementById("parados").innerText = clientes.filter(c =>
    diasSemContato(c.ultimo_contato) >= 3 && c.status !== "Fechado" && c.status !== "Perdido"
  ).length;
}

function classeTemperatura(temp) {
  if (temp === "Quente") return "quente";
  if (temp === "Morno") return "morno";
  if (temp === "Frio") return "frio";
  return "novo";
}

function classeStatus(status) {
  if (status === "Em negociação") return "negociando";
  if (status === "Novo") return "novo";
  if (status === "Fechado") return "negociando";
  if (status === "Perdido") return "quente";
  return "novo";
}

function textoUltimoContato(data) {
  const dias = diasSemContato(data);
  if (dias === 0) return "Hoje";
  if (dias === 1) return "1 dia atrás";
  return dias + " dias atrás";
}

function renderizar() {
  const lista = document.getElementById("lista");
  const filtrados = clientes.filter(aplicaFiltro);

  lista.innerHTML = "";

  if (filtrados.length === 0) {
    lista.innerHTML = `<div class="empty">Nenhum cliente encontrado nesse filtro.</div>`;
    return;
  }

  filtrados.forEach(item => {
    const dias = diasSemContato(item.ultimo_contato);
    const parado = dias >= 3 && item.status !== "Fechado" && item.status !== "Perdido";

    lista.innerHTML += `
      <div class="lead">
        <div class="lead-content">
          <div class="lead-header">
            <h3>${item.nome}</h3>
            <div>
              ${item.temperatura ? `<span class="tag ${classeTemperatura(item.temperatura)}">${item.temperatura}</span>` : ""}
              ${parado ? `<span class="tag parado">Parado há ${dias} dias</span>` : ""}
            </div>
          </div>

          <div class="lead-grid">
            <div class="info"><span>WhatsApp</span><strong>${item.telefone}</strong></div>
            <div class="info"><span>Veículo</span><strong>${item.carro}</strong></div>
            <div class="info"><span>Valor</span><strong>${dinheiro(item.valor)}</strong></div>
            <div class="info"><span>Status</span><strong class="tag ${classeStatus(item.status)}">${item.status || "Novo"}</strong></div>
            <div class="info"><span>Último contato</span><strong>${textoUltimoContato(item.ultimo_contato)}</strong></div>
          </div>

          ${item.observacao ? `<div class="obs"><strong>Observação:</strong><br>${item.observacao}</div>` : ""}

          <div class="actions">
            <button class="btn-wpp" onclick='abrirWhatsApp(${JSON.stringify(item)})'>💬 WhatsApp</button>
            <button class="btn-edit" onclick='preencherFormulario(${JSON.stringify(item)})'>✏️ Editar cliente</button>
            <button class="btn-delete" onclick='excluir("${item.id}")'>Excluir</button>
          </div>
        </div>
      </div>
    `;
  });
}

carregar();
</script>

</body>
</html>
