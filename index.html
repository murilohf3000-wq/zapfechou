<!-- 🔥 LOGIN -->
<input id="loginNome" type="text" placeholder="Seu nome">
<input id="loginEmail" type="email" placeholder="Email">
<input id="loginSenha" type="password" placeholder="Senha">

<script>

async function criarConta() {
  const nome = document.getElementById("loginNome").value.trim();
  const email = document.getElementById("loginEmail").value.trim();
  const senha = document.getElementById("loginSenha").value;

  if (!nome || !email || !senha) {
    alert("Preencha nome, email e senha.");
    return;
  }

  if (senha.length < 6) {
    alert("A senha precisa ter pelo menos 6 caracteres.");
    return;
  }

  const { error } = await supabaseClient.auth.signUp({
    email,
    password: senha,
    options: {
      data: {
        nome: nome
      }
    }
  });

  if (error) {
    alert("Erro ao criar conta: " + error.message);
    return;
  }

  alert("Conta criada! Agora é só entrar.");
  verificarSessao();
}

function nomeDoUsuario() {
  const metaNome = usuarioAtual?.user_metadata?.nome;

  if (metaNome) return formatarNome(metaNome);

  const email = usuarioAtual?.email || "vendedor";
  return formatarNome(email.split("@")[0]);
}

function atualizarTopoUsuario() {
  const nome = nomeDoUsuario();

  document.getElementById("userGreeting").innerText = nome;
  document.getElementById("userStatus").innerText = "● Online";
  document.getElementById("accountArea").style.display = "flex";
  document.getElementById("welcomeBox").style.display = "none";
}

</script>
