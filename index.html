<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

<title>ZapFechou PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #020403;
  color: #f8fafc;
}

/* ===== LAYOUT ===== */

.layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: 100vh;
}

.sidebar {
  border-right: 1px solid rgba(0,255,100,.18);
  background: rgba(0,0,0,.55);
  padding: 22px;
}

.app {
  padding: 30px;
  max-width: 1350px;
  margin: auto;
  width: 100%;
}

/* ===== TOPO ===== */

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

h1 {
  font-size: 32px;
  margin: 0;
}

h1 span { color: #00ff66; }

/* ===== CARDS ===== */

.stats {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 16px;
  margin-bottom: 20px;
}

.stat {
  padding: 20px;
  border-radius: 18px;
  background: rgba(3,8,7,.85);
  border: 1px solid rgba(0,255,100,.2);
}

.stat strong {
  font-size: 28px;
  display: block;
}

/* ===== FORM ===== */

.panel {
  padding: 18px;
  border-radius: 18px;
  background: rgba(3,8,7,.85);
  border: 1px solid rgba(0,255,100,.2);
  margin-bottom: 20px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr .9fr 1fr .7fr .8fr .8fr;
  gap: 10px;
}

textarea {
  grid-column: 1 / -1;
  min-height: 60px;
}

input, select, textarea {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(148,163,184,.22);
  background: rgba(0,0,0,.45);
  color: white;
}

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.btn-add {
  background: #00ff66;
  color: #000;
}

/* ===== LISTA ===== */

.table-box {
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid rgba(0,255,100,.2);
}

.lead-row {
  padding: 14px;
  border-bottom: 1px solid rgba(148,163,184,.1);
}

/* ===== MOBILE ===== */

@media (max-width: 1050px) {

  .layout {
    display: block;
  }

  .sidebar {
    display: none;
  }

  .app {
    padding: 16px;
  }

  .stats {
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
  }

  .stat {
    padding: 14px;
  }

  .stat strong {
    font-size: 22px;
  }

  .form-grid {
    grid-template-columns: 1fr 1fr;
  }

  textarea {
    grid-column: 1 / -1;
  }

  .lead-row {
    border-radius: 12px;
    margin-bottom: 10px;
    background: rgba(3,8,7,.9);
  }

}

@media (max-width: 520px) {

  .stats {
    grid-template-columns: 1fr;
  }

  .form-grid {
    grid-template-columns: 1fr;
  }

}

</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <h2>ZF</h2>
</div>

<div class="app">

<div class="topbar">
  <h1>Zap<span>Fechou</span></h1>
</div>

<div class="stats">
  <div class="stat"><span>Total</span><strong id="total">0</strong></div>
  <div class="stat"><span>Negociando</span><strong id="negociando">0</strong></div>
  <div class="stat"><span>Fechados</span><strong id="fechados">0</strong></div>
  <div class="stat"><span>Parados</span><strong id="parados">0</strong></div>
</div>

<div class="panel">

<div class="form-grid">
  <input id="nome" placeholder="Nome">
  <input id="telefone" placeholder="WhatsApp">
  <input id="carro" placeholder="Carro">
  <input id="valor" type="number" placeholder="Valor">

  <select id="temperatura">
    <option>Quente</option>
    <option>Morno</option>
    <option>Frio</option>
  </select>

  <select id="status">
    <option>Novo</option>
    <option>Em negociação</option>
    <option>Fechado</option>
    <option>Perdido</option>
  </select>

  <textarea id="observacao" placeholder="Observação"></textarea>

  <button class="btn-add" onclick="salvarCliente()">Salvar</button>
</div>

</div>

<div class="table-box">
  <div id="lista"></div>
</div>

</div>
</div>

<script>

const supabaseClient = supabase.createClient(
  "https://khuxxjtcunknikkpdgfi.supabase.co",
  "sb_publishable_E9roE3LHgPf42wAi8DXzSA_IjvXBKgl"
);

let clientes = [];

async function carregar() {
  const { data } = await supabaseClient.from("leads").select("*");
  clientes = data || [];
  renderizar();
}

async function salvarCliente() {
  const nome = document.getElementById("nome").value;
  const telefone = document.getElementById("telefone").value;
  const carro = document.getElementById("carro").value;

  if (!nome || !telefone || !carro) {
    alert("Preenche tudo");
    return;
  }

  await supabaseClient.from("leads").insert([{ nome, telefone, carro }]);

  carregar();
}

function renderizar() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  clientes.forEach(c => {
    lista.innerHTML += `
      <div class="lead-row">
        <strong>${c.nome}</strong><br>
        ${c.telefone} - ${c.carro}
      </div>
    `;
  });

  document.getElementById("total").innerText = clientes.length;
}

carregar();

</script>

</body>
</html>
